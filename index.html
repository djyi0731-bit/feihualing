<html lang="zh-CN">
<head>

<title>翰宝可乐专属飞花令</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#121922; --panel2:#18222e;
    --line:#26323f; --txt:#e8eef5; --muted:#8da0b3;
    --accent:#2dd4bf; --accent2:#f97316;
    --ok:#34d399; --bad:#f87171;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:url('assets/bg.jpg') no-repeat center center / cover fixed;
    color:var(--txt);
    font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
    overflow:hidden;user-select:none;}
  /* 暗色蒙层，保证文字在亮背景上可读 */

  #log{flex:0 0 38%;overflow-y:auto;background:rgba(18,25,34,.35);border:1px solid rgba(255,255,255,.08);border-radius:1.6vmin;padding:1.6vmin;display:flex;flex-direction:column;gap:1.2vmin;}

<body>
<div id="stage">
  <header>
    <div class="logo">翰宝可乐专属飞花令</div>
    <div class="token"><span class="k">令字</span><span class="v" id="tokenChar">—</span></div>
    <div class="score"><span class="k">得分</span><br><span class="v" id="score">0</span></div>
  </header>

  <div id="main">
    <div id="log"></div>
    <div id="poem"><div class="pc-empty">诗词全文与作者画像<br>将在此展示</div></div>
  </div>

  <div id="status"><span class="dot" id="dot"></span><span id="statusText">点击「开始」出题</span></div>

  <div id="manual">
    <input id="manualInput" placeholder="语音不可用？在此手动输入诗句，或输入「下一轮」" />
    <button id="manualSend">提交</button>
  </div>

  <div id="bar">
    <button id="btnTalk"><span class="ic">🎤</span><span>听我说</span></button>

    <button id="btnEnd"><span class="ic">⏹</span><span>结束</span></button>
    <button id="btnNext" class="hide"><span class="ic">⏭</span><span>下一轮</span></button>
  </div>

  <div id="cover">
    <h1>翰宝可乐专属飞花令</h1>
    <p>系统给出一个「令字」，请说出一首<strong>真实存在的诗词</strong>（唐诗 / 宋词 / 元曲 / 诗经），且<strong>包含该字</strong>（不可重复）。答对后展示该诗<strong>全文</strong>；展示 10 秒或说「下一轮」后系统接句。</p>
    <button id="btnStart">开 始 游 戏</button>
    <small id="libInfo">正在准备离线题库…</small>
  </div>
</div>

<script>
/* ============ 异步加载题库（IndexedDB 缓存 + 进度显示） ============ */
const LIB_VER = "v10";
const POEMS_URL = "poems.js";
const POEMS_SIZE_MB = 8;  // 实际 ~7.8MB
const CACHE_KEY = "fhl_poems_v10";

/* IndexedDB 工具：缓存 poems.js 文本（首次慢、之后秒开） */
const IDB_CACHE = "fhl_cache", IDB_CACHE_STORE = "scripts";
function idbCacheOpen(){
  return new Promise((res, rej) => {
    if (!("indexedDB" in window)) return rej(new Error("no-idb"));
    const rq = indexedDB.open(IDB_CACHE, 1);
    rq.onupgradeneeded = () => { const db = rq.result; if (!db.objectStoreNames.contains(IDB_CACHE_STORE)) db.createObjectStore(IDB_CACHE_STORE, { keyPath: "k" }); };
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error);
  });
}
async function idbCacheGet(key){
  try {
    const db = await idbCacheOpen();
    return await new Promise(res => {
      const rq = db.transaction(IDB_CACHE_STORE, "readonly").objectStore(IDB_CACHE_STORE).get(key);
      rq.onsuccess = () => res(rq.result ? rq.result.v : null);
      rq.onerror = () => res(null);
    });
  } catch (_) { return null; }
}
async function idbCacheSet(key, val){
  try {
    const db = await idbCacheOpen();
    await new Promise(res => {
      const tx = db.transaction(IDB_CACHE_STORE, "readwrite").objectStore(IDB_CACHE_STORE);
      tx.put({ k: key, v: val, t: Date.now() });
      tx.transaction.oncomplete = () => res();
      tx.transaction.onerror = () => res();
    });
  } catch (_) {}
}

/* fetch + 进度 */
function fetchWithProgress(url, onProgress){
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("GET", url + "?" + LIB_VER, true);
    xhr.responseType = "text";
    xhr.onprogress = e => { if (e.lengthComputable && onProgress) onProgress(e.loaded, e.total); };
    xhr.onload = () => { if (xhr.status >= 200 && xhr.status < 300) resolve(xhr.response); else reject(new Error("HTTP " + xhr.status)); };
    xhr.onerror = () => reject(new Error("网络错误"));
    xhr.send();
  });
}

/* eval 文本为代码（注入到全局） */
function evalPoemsScript(code){
  const s = document.createElement("script");
  s.text = code;
  document.head.appendChild(s);
  document.head.removeChild(s);
}

function loadScript(src, id){
  return new Promise((res, rej) => {
    const s = document.createElement("script"); s.src = src + "?" + LIB_VER; s.id = id;
    s.onload = res; s.onerror = () => rej(new Error("加载失败: " + src));
    document.head.appendChild(s);
  });
}

async function initLib(){
  // 1) 尝试从 IndexedDB 缓存加载
  let code = await idbCacheGet(CACHE_KEY);
  if (code) {
    setCoverInfo("⏳ 从本地缓存载入题库…");
    evalPoemsScript(code);
    if (window.POEM_DB && window.POEM_DB.length) {
      await loadDbAndIndex();
      return;
    }
    setCoverInfo("⚠️ 缓存损坏，重新下载…");
    code = null;
  }

  // 2) 在线下载 + 进度显示
  setCoverInfo(`⏳ 正在下载离线题库（约 ${POEMS_SIZE_MB}MB，首次需数秒）…`);
  try {
    code = await fetchWithProgress(POEMS_URL, (loaded, total) => {
      const pct = total ? Math.round(loaded / total * 100) : 0;
      const loadedMB = (loaded / 1024 / 1024).toFixed(1);
      setCoverInfo(`⏳ 下载题库… ${loadedMB}MB (${pct}%)`);
    });
  } catch (e) {
    setCoverInfo("❌ 题库下载失败: " + e.message + " — 请检查网络后刷新");
    return;
  }

  // 3) 写入缓存（后台）
  idbCacheSet(CACHE_KEY, code);
  setCoverInfo("⏳ 解析题库…");
  evalPoemsScript(code);
  if (!window.POEM_DB || !window.POEM_DB.length) {
    setCoverInfo("❌ 题库解析失败，文件可能已损坏，请刷新重试");
    return;
  }

  await loadDbAndIndex();
}

async function loadDbAndIndex(){
  setCoverInfo("⏳ 加载搜索引擎…");
  try {
    await loadScript("db.js", "lib-db");
  } catch (e) {
    setCoverInfo("❌ 引擎加载失败: " + e.message);
    return;
  }

  /* 分片异步建索引（不卡UI） */
  const TOKENS = window.FHL_TOKENS || [];
  FHLDB.setTokens(TOKENS);
  const DB = window.POEM_DB || [];
  const TOTAL = DB.length, CHUNK = 3000;
  let done = 0;
  function chunk(){
    const end = Math.min(done + CHUNK, TOTAL);
    const slice = DB.slice(done, end);
    if (slice.length) { FHLDB.addPoems(slice); done = end; }
    const pct = Math.round(done / TOTAL * 100);
    setCoverInfo("⏳ 正在建立索引… " + done.toLocaleString() + "/" + TOTAL.toLocaleString() + " (" + pct + "%)");
    if (done < TOTAL) { requestAnimationFrame(chunk); }
    else { onReady(); }
  }
  requestAnimationFrame(chunk);

  function onReady(){
    const s = FHLDB.stats();
    const tk = (window.FHL_TOKENS || []).length;
    if (s.poems === 0 || tk === 0) {
      setCoverInfo("❌ 题库加载失败（可能网络中断），请刷新页面重试");
      setStatus("题库加载失败，请刷新重试", false);
      return;
    }
    setCoverInfo("✅ 题库就绪：" + s.poems.toLocaleString() + " 首（高频可玩核心集，生僻诗走联网）");
    setStatus('题库 <b>' + s.poems.toLocaleString() + '</b> 首已就绪，点「开始」出题');
    window.__libReady = true;
  }
}

initLib();   // ← 启动异步加载
</script>

<script>
/* 清洗标点/空白（与 FHLDB 内一致） */
const PUNCT=/[，。、？！,.?!；;：:""''「」『』（）()《》<>—\-…·~～·\s]/g;
const strip=s=>(s||"").replace(PUNCT,"");

/* 数据层（本地为主 + 在线补全）薄封装 */
const matchPoem  = clean => FHLDB.match(clean);
const fuzzyMatch = (clean,token) => FHLDB.fuzzy(clean,token);

let awaitNext=false, nextTimer=null, cdTimer=null, countdown=10, verifying=false;
const $=s=>document.querySelector(s);
const logEl=$("#log"), poemEl=$("#poem");
function setCoverInfo(txt){ const el=$("#libInfo"); if(el) el.textContent=txt; }

/* ============ 语音播报 TTS（答对赞美 / 答错提示） ============ */
const PRAISE=[

  "答对了！这波属于是降维打击！"
];
const WRONG=[
  "没有这首诗词哦，再想想？",
  "这句我好像没听过呢，换个带令字的试试？",
  "emmm，好像不是诗词哦，再接一句？",
  "不对不对，这句诗库里没有，再来！"
];
function pickZhVoice(){
  if(!('speechSynthesis' in window)) return null;
  const vs=speechSynthesis.getVoices()||[];
  return vs.find(v=>/zh|Chinese|中文|普通话/i.test(v.lang+" "+v.name)) || vs[0] || null;
}
function speak(text){
  if(!('speechSynthesis' in window) || !text) return;
  try{ speechSynthesis.cancel(); }catch(_){}
  const u=new SpeechSynthesisUtterance(text);
  u.lang="zh-CN"; u.rate=1.0; u.pitch=1.0;
  const v=pickZhVoice(); if(v) u.voice=v;
  try{ speechSynthesis.speak(u); }catch(_){}
}
if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged=()=>{}; }

function addBubble(who,text){
  const r=document.createElement("div"); r.className="row "+(who==="me"?"me":"sys");
  r.innerHTML=`<div class="bubble">${text}</div>`; logEl.appendChild(r); logEl.scrollTop=logEl.scrollHeight;
}
function addVerdict(ok,text){
  const v=document.createElement("div"); v.className="verdict "+(ok?"ok":"bad");
  v.textContent=(ok?"✓ ":"✗ ")+text; logEl.appendChild(v); logEl.scrollTop=logEl.scrollHeight;
}
function setStatus(t,live=false){ $("#statusText").innerHTML=t; $("#dot").className="dot"+(live?" live":""); }
function setScore(n){ state.score=n; $("#score").textContent=n; }

/* ============ 右侧诗词全文卡（作者头像 + 诗词插画位） ============ */
function showPoem(p){
  const full=(p.p||[]).join("");
  const bodyHtml=full.replace(new RegExp(state.token,"g"),`<span class="hl">${state.token}</span>`).replace(/([，。！？；])/g,"$1<br>");
  const avatar=p.i
    ? `<img class="pc-avatar" src="assets/${p.i}.jpg" alt="${p.a}" onerror="this.outerHTML='<div class=&quot;pc-badge&quot;>${p.a[0]}</div>'"/>`
    : `<div class="pc-badge">${p.a[0]}</div>`;
  const picBlock=p.pic
    ? `<img class="pc-pic" src="assets/${p.pic}" alt="诗词插画" onerror="this.style.display='none'"/>`
    : `<div class="pc-pic pc-pic-empty">诗词插画位（待 AI 生成）</div>`;
  poemEl.innerHTML=`
    <div class="pc-head">${avatar}
      <div><div class="pc-title">${p.t}</div>
      <div class="pc-meta"><b>${p.a}</b> 〔${p.d}〕</div></div>
    </div>
    ${picBlock}
    <div class="pc-body">${bodyHtml}</div>
    <div class="pc-src">数据来源：chinese-poetry 开源诗词库（简体）</div>`;
  poemEl.scrollTop=0;
}

function pickToken(){
  const TOKENS = window.FHL_TOKENS || [];
  if(!TOKENS.length){ addVerdict(false,"令字表为空，题库可能未完整加载，请刷新重试"); return; }
  let t; do{ t=TOKENS[Math.floor(Math.random()*TOKENS.length)]; }while(t===state.token && TOKENS.length>1);
  state.token=t; $("#tokenChar").textContent=t;
  const mi=$("#manualInput"); if(mi) mi.placeholder="语音不可用？输入含「"+t+"」的诗句（整联两句），或输入「下一轮」";
}
function sysSay(){
  const p=FHLDB.randomByToken(state.token, state.usedTitles);
  if(!p){ addBubble("sys","（这个令字我接不上来，换一个吧）"); return null; }
  state.usedTitles.add(p.t);
  (p._units||[]).forEach(u=>state.usedLines.add(u));   // 系统展示诗的各联标记已用，防用户照抄
  /* 取这首诗里含当前令字的第一联作为系统"说出"的句子 */
  const saidUnit=(p._units||[]).find(u=>u.includes(state.token))||(p._units||[])[0]||"";
  const saidText=saidUnit?saidUnit.replace(/(.{6,14})(.)/g,"$1$2<br>"):"";
  addBubble("sys",`（系统）${p.t}·${p.a}<br><span class="sys-poem">${saidText}</span>`);
  showPoem(p);
  /* 朗读系统接出的诗句 */
  speak(p.t+"。"+p.a+"。"+saidUnit);
  return p;
}
function startGame(){
  if(!window.__libReady){ alert("题库还在加载中，请稍等…"); return; }
  state={ token:"", usedTitles:new Set(), usedLines:new Set(), score:0, running:true };
  logEl.innerHTML=""; setScore(0); $("#cover").classList.add("hide");
  pickToken();
  addBubble("sys",`本局令字「${state.token}」，我先来——`);
  sysSay();
  setStatus('请说出含 <b>'+state.token+'</b> 的诗句，已持续聆听');
  startContinuous();
}

/* ============ 答对后的「展示 + 等待下一轮」 ============ */
function enterAwaitNext(){
  awaitNext=true; countdown=10;
  $("#btnNext").classList.remove("hide");
  updateAwaitStatus();
  clearTimeout(nextTimer); clearInterval(cdTimer);
  nextTimer=setTimeout(advanceRound,10000);
  cdTimer=setInterval(()=>{ countdown--; if(countdown<=0){clearInterval(cdTimer);} else updateAwaitStatus(); },1000);
}
function updateAwaitStatus(){
  setStatus('答对啦！<b>'+countdown+'</b> 秒后我接下一句，或点「下一轮」');
}
function advanceRound(){
  if(!awaitNext) return;
  clearTimeout(nextTimer); clearInterval(cdTimer); awaitNext=false;
  $("#btnNext").classList.add("hide"); $("#btnTalk").classList.remove("disabled");
  if(!state.running) return;
  addBubble("sys","该我了——"); speak("该我了，听好");
  sysSay();
  setStatus('轮到你，说出含 <b>'+state.token+'</b> 的诗句',false);
}

function judge(text){
  if(!text||!text.trim()){ addVerdict(false,"没听清，请重试"); speak("没听清，请重试"); return; }
  if(awaitNext) return; // 等待下一轮期间忽略其它语音
  if(verifying) return; // 联网核对进行中，忽略新的语音判题，避免并发
  const clean=(window.FHLDB&&window.FHLDB.norm)?window.FHLDB.norm(text):strip(text);
  // 精确匹配优先；语音识别偏差时走「容错模糊匹配」（仍须真实诗词、含令字、接近整联）
  let r=matchPoem(clean);
  let fuzzy=false;
  if(!r){ r=fuzzyMatch(clean,state.token); fuzzy=true; }
  if(!r){
    // 本地题库 + 容错匹配都未命中 → 不直接判错，先联网核对该诗句是否真实存在
    onlineVerify(text.trim(), clean, state.token);
    return;
  }
  const hit=r.poem, unit=r.unit;               // unit=命中的「联」（一整联两句）
  if(!clean.includes(state.token) && !unit.includes(state.token)){
    addVerdict(false,"这句里没有「"+state.token+"」字");
    setStatus('换一句含 <b>'+state.token+'</b> 的真实诗词，点 🎤');
    speak("这句诗里没有「"+state.token+"」字，换一句"); return;
  }
  if(state.usedLines.has(unit)){ addVerdict(false,"这句用过了，换一句"); speak("这句用过了，换一句"); return; }
  // —— 通过：确为真实诗词且该联含令字且未重复 ——（同一首诗的不同联可分别接）
  state.usedLines.add(unit); setScore(state.score+10);
  addBubble("me",text.trim()); addVerdict(true, fuzzy?"接得妙！+10（语音纠错）":"接得妙！+10");
  state.usedTitles.add(hit.t); showPoem(hit);
  speak(PRAISE[Math.floor(Math.random()*PRAISE.length)]);
  enterAwaitNext();
}

/* ============ 联网核对：本地库未命中时，上网搜索该诗句是否真实存在 ============
   数据源：诗泉 API(poetry.palemoky.com)，开源免费、无需密钥、支持 CORS(ACAO:*)、
   大陆可直接访问，数据同源 chinese-poetry(37 万+ 首)。用全文检索核对句子是否
   真实存在，命中即返回完整诗文，直接复用诗词全文卡展示。 */
const ONLINE_API="https://poetry.palemoky.com/api/search?q=";
/* 取用户输入里最长的一个分句（≥4字）做检索关键词，命中率更高 */
function longestClause(text){
  const parts=(text||"").split(PUNCT).map(s=>s.trim()).filter(s=>s.length>=4);
  parts.sort((a,b)=>b.length-a.length);
  return parts[0] || strip(text);
}
async function onlineSearch(phrase){
  const ctrl=new AbortController();
  const to=setTimeout(()=>ctrl.abort(),6000);   // 车载端联网慢/被拦时避免 verifying 卡死
  try{
    const res=await fetch(ONLINE_API+encodeURIComponent(phrase),{mode:"cors",signal:ctrl.signal});
    if(!res.ok) throw new Error("http "+res.status);
    const j=await res.json();
    return (j&&j.data)||[];
  } finally { clearTimeout(to); }
}
/* 诗泉返回项 → 本地诗词卡格式 {t,a,d,p,i} */
function mapOnline(item){
  return { t:item.title||"(佚名)", a:(item.author&&item.author.name)||"佚名",
           d:(item.dynasty&&item.dynasty.name)||"", p:item.content||[], i:"" };
}
/* 候选里优先挑正文确实包含用户诗句的一首，挑不到则取相关度最高的首项 */
function pickMatched(list,clean){
  if(clean){
    for(const it of list){ if(strip((it.content||[]).join("")).includes(clean)) return it; }
    const head=clean.slice(0,Math.min(5,clean.length));
    for(const it of list){ if(strip((it.content||[]).join("")).includes(head)) return it; }
  }
  return list[0];
}
async function onlineVerify(rawText,clean,token){
  verifying=true;
  addVerdict(false,"本地题库未收录，正在联网核对是否真有此句…");
  setStatus('联网核对「'+rawText+'」是否真实存在…',true);
  const phrase=longestClause(rawText);
  let list=null, failed=false;
  try{ list=await onlineSearch(phrase); }
  catch(e){ failed=true; }
  verifying=false;
  if(failed){
    addVerdict(false,"联网核对失败（网络异常），暂按未收录处理");
    setStatus('网络异常，请换一句含 <b>'+token+'</b> 的诗词，或稍后重试');
    speak("网络不太好，暂时查不到，换一句试试");
    return;
  }
  if(!list || !list.length){
    addVerdict(false,"联网也没查到这句，可能不是真实诗词");
    setStatus('请说出一首含 <b>'+token+'</b> 的真实诗词/元曲');
    speak(WRONG[Math.floor(Math.random()*WRONG.length)]);
    return;
  }
  const poem=mapOnline(pickMatched(list,clean));
  // 网络确认真实存在 —— 再校验令字与去重
  if(!clean.includes(token)){
    addVerdict(false,"网络查到这句诗，但其中没有「"+token+"」字");
    setStatus('这句真实存在，但缺「'+token+'」字，换一句');
    speak("这句诗是真的，但没有「"+token+"」字，换一句");
    showPoem(poem);
    return;
  }
  if(state.usedLines.has(clean)){
    addVerdict(false,"这句用过了，换一句");
    speak("这句用过了，换一句");
    return;
  }
  // 通过：网络查证真实 + 含令字 + 未重复 → 计分并展示全文
  state.usedLines.add(clean);
  if(poem.t) state.usedTitles.add(poem.t);
  setScore(state.score+10);
  addBubble("me",rawText);
  addVerdict(true,"网络查证通过！+10（本地库未收录，已联网确认）");
  showPoem(poem);
  speak(PRAISE[Math.floor(Math.random()*PRAISE.length)]);
  enterAwaitNext();
}

function endGame(){
  state.running=false; awaitNext=false; verifying=false; clearTimeout(nextTimer); clearInterval(cdTimer); stopListen();
  $("#btnNext").classList.add("hide"); $("#btnTalk").classList.remove("disabled");
  const c=$("#cover"); c.classList.remove("hide");
  c.querySelector("h1").textContent="本局结束";
  c.querySelector("p").innerHTML="最终得分 <b style='color:#2dd4bf;font-size:1.4em'>"+state.score+"</b> 分";
  $("#btnStart").textContent="再 来 一 局"; setStatus("已结束");
}

/* ============ 语音识别（Web Speech API，中文） ============ */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recog=null,listening=false;
const isNextCmd = t => /下一轮|下一个|继续|下一局|下圈|换一个/.test(t);
let continuousMode=false;            // 持续聆听开关：开启后麦克风常开、自动识别判题

function updateTalkBtn(){
  const b=$("#btnTalk"), lbl=b.querySelector("span:last-child");
  if(continuousMode){ b.classList.add("listening"); lbl.textContent="聆听中·点此暂停"; }
  else if(state.running){ b.classList.remove("listening"); lbl.textContent="开始聆听"; }
  else { b.classList.remove("listening"); lbl.textContent="听我说"; }
}

/* 安全启动语音识别（必须在用户手势内调用才能拉起权限弹窗） */
function safeStartRecog(){
  if(!recog) return false;
  if(listening) return true;          // 已经在听，不必重复
  try {
    recog.start();
    listening = true;
    return true;
  } catch(e) {
    listening = false;
    continuousMode = false;
    updateTalkBtn();
    // 区分：权限被拒 vs 其他错误
    if (e.name === "NotAllowedError" || String(e.message||"").indexOf("not-allowed") >= 0) {
      setStatus("麦克风权限未授权 ❌ 请点击浏览器地址栏旁的小锁图标→开启麦克风权限，然后刷新页面");
    } else {
      setStatus("语音启动失败：" + (e.message || e.name) + "。请使用手动输入");
    }
    showManual(true);
    return false;
  }
}

function startContinuous(){
  if(!recog){ showManual(true); setStatus("当前浏览器不支持语音，请手动输入"); return; }
  if(continuousMode) return;
  continuousMode=true; updateTalkBtn();
  setStatus("请说出含 <b>"+state.token+"</b> 的诗句…",true);
  if(!safeStartRecog()) return;       // 权限未授权 → 已显示手动输入框
}

function pauseListen(){
  if(!continuousMode) return;
  continuousMode=false; listening=false; updateTalkBtn();
  try{ recog.stop(); }catch(_){}
  setStatus('已暂停聆听，点「开始聆听」继续（或手动输入）');
}

function stopListen(){
  continuousMode=false; listening=false;
  try{ recog&&recog.stop(); }catch(_){}
  updateTalkBtn();
}

if(SR){
  recog=new SR(); recog.lang="zh-CN"; recog.continuous=true; recog.interimResults=false; recog.maxAlternatives=1;
  recog.onresult=e=>{
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(!e.results[i].isFinal) continue;
      const t=(e.results[i][0].transcript||"").trim();
      if(!t) continue;
      if(awaitNext){ if(isNextCmd(t)) advanceRound(); continue; }   // 等待期只认「下一轮」口令
      judge(t);                                                     // 对局期直接判题
    }
  };
  recog.onerror=e=>{
    listening=false;
    if(e.error==="not-allowed"||e.error==="service-not-allowed"){
      continuousMode=false; updateTalkBtn();
      setStatus("麦克风权限被拒绝 ❌ 请刷新页面后重新授权，或使用手动输入"); showManual(true);
    } else if(e.error==="no-speech"||e.error==="aborted"||e.error==="network"){
      // 临时错误 → 交给 onend 自动重启
      setStatus("聆听中…（"+e.error+"）",true);
    } else {
      setStatus("语音识别异常："+e.error+"。可手动输入",false);
    }
  };
  recog.onend=()=>{
    listening=false;
    if(continuousMode && state.running){
      // 自动重启：免唤醒持续收音。必须尽快重启，否则语音断开
      setTimeout(()=>{
        if(!continuousMode||!state.running) return;
        safeStartRecog();
      }, 200);
    } else { updateTalkBtn(); }
  };
}else{ showManual(true); setStatus("当前浏览器不支持语音，请手动输入"); }
function showManual(on){ $("#manual").style.display=on?"flex":"none"; }

$("#btnStart").onclick=startGame;
$("#btnTalk").onclick=()=>{
  if(!state.running){ startGame(); return; }
  if(awaitNext){ advanceRound(); return; }
  if(continuousMode) pauseListen(); else startContinuous();
};
$("#btnSwap").onclick=()=>{ if(!state.running) return;
  state.usedTitles=new Set(); state.usedLines=new Set(); pickToken();
  logEl.innerHTML=""; addBubble("sys","换令字！本局令字「"+state.token+"」——"); sysSay();
  setStatus('请说出含 <b>'+state.token+'</b> 的诗句'); };
$("#btnEnd").onclick=endGame;
$("#btnNext").onclick=()=>{ if(awaitNext) advanceRound(); };
$("#manualSend").onclick=()=>{ const v=$("#manualInput").value.trim(); if(!v) return;
  if(awaitNext && isNextCmd(v)){ advanceRound(); $("#manualInput").value=""; return; }
  judge(v); $("#manualInput").value=""; };
$("#manualInput").addEventListener("keydown",e=>{ if(e.key==="Enter") $("#manualSend").click(); });

/* ============ 数据层初始化已移至顶部异步流程（initLib） ============ */
</script>
</body>
</html>
